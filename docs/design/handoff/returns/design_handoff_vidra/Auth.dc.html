<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <helmet>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
          href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
          rel="stylesheet"
        />
        <style>
          * {
            box-sizing: border-box;
          }
          body {
            margin: 0;
            background: #070809;
          }
          input {
            font-family: "Space Grotesk", sans-serif;
          }
          input::placeholder {
            color: #7c7688;
          }
          @keyframes авFloat {
            0%,
            100% {
              transform: translateY(0);
            }
            50% {
              transform: translateY(-10px);
            }
          }
          @keyframes avFloat {
            0%,
            100% {
              transform: translate(0, 0) scale(1);
            }
            50% {
              transform: translate(-6px, -12px) scale(1.06);
            }
          }
          @keyframes avModal {
            from {
              opacity: 0;
              transform: translate(-50%, -46%);
            }
            to {
              opacity: 1;
              transform: translate(-50%, -50%);
            }
          }
        </style>
      </helmet>
      <div
        ref="{{ rootRef }}"
        style="
          position: relative;
          width: 1440px;
          height: 900px;
          overflow: hidden;
          background: #0a0b0e;
          font-family: &quot;Space Grotesk&quot;, system-ui, sans-serif;
          color: #f2f3f6;
          isolation: isolate;
          --accent: #5b6cff;
        "
      >
        <!-- BEHIND: dimmed workspace with draft held -->
        <div
          style="
            position: absolute;
            inset: 0;
            display: flex;
            filter: saturate(0.9);
          "
        >
          <div
            style="
              width: 64px;
              flex: none;
              background: #0c0d11;
              border-right: 1px solid rgba(255, 255, 255, 0.06);
              display: flex;
              flex-direction: column;
              align-items: center;
              padding: 18px 0;
            "
          >
            <div
              style="
                width: 30px;
                height: 30px;
                border-radius: 9px;
                background: linear-gradient(
                  150deg,
                  var(--accent, #5b6cff),
                  #9aa6ff
                );
              "
            ></div>
            <div style="height: 26px"></div>
            <div
              style="
                width: 34px;
                height: 34px;
                border-radius: 9px;
                border: 1px solid rgba(255, 255, 255, 0.08);
                background: rgba(255, 255, 255, 0.03);
              "
            ></div>
            <div style="flex: 1"></div>
            <div
              style="
                width: 34px;
                height: 34px;
                border-radius: 50%;
                background: linear-gradient(150deg, #2b2f3a, #171922);
                border: 1px solid rgba(255, 255, 255, 0.14);
              "
            ></div>
          </div>
          <div
            style="
              flex: 1;
              display: flex;
              flex-direction: column;
              align-items: center;
              justify-content: center;
              gap: 20px;
            "
          >
            <div
              style="
                font:
                  400 11px &quot;Space Mono&quot;,
                  monospace;
                letter-spacing: 0.24em;
                text-transform: uppercase;
                color: #5b616e;
              "
            >
              Untitled
            </div>
            <div
              style="
                width: 560px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 18px;
                background: rgba(20, 21, 27, 0.7);
                padding: 20px 22px 16px;
              "
            >
              <div
                style="
                  font:
                    400 20px &quot;Space Grotesk&quot;,
                    sans-serif;
                  color: #cdd0d7;
                  line-height: 1.5;
                "
              >
                A drone shot pulling back over a coastal town at dawn, mist over
                the rooftops
              </div>
              <div
                style="
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  margin-top: 16px;
                "
              >
                <span
                  style="
                    font:
                      400 12px &quot;Space Mono&quot;,
                      monospace;
                    color: #6b7180;
                  "
                  >16:9 · 6s</span
                >
                <div
                  style="
                    width: 42px;
                    height: 42px;
                    border-radius: 50%;
                    background: var(--accent, #5b6cff);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                  "
                >
                  <svg
                    width="17"
                    height="17"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="#fff"
                    stroke-width="2.1"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  >
                    <path d="M12 19V5"></path>
                    <path d="M6 11l6-6 6 6"></path>
                  </svg>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- scrim -->
        <div
          onClick="{{ dismiss }}"
          style="
            position: absolute;
            inset: 0;
            background: rgba(6, 7, 9, 0.74);
            backdrop-filter: blur(3px);
            z-index: 5;
          "
        ></div>

        <!-- MODAL -->
        <div
          style="
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            width: 744px;
            background: #131117;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            box-shadow: 0 50px 110px -30px rgba(0, 0, 0, 0.8);
            overflow: hidden;
            z-index: 6;
            animation: avModal 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) both;
          "
        >
          <!-- AUTH COLUMN -->
          <div
            style="
              width: 412px;
              padding: 40px 36px 32px;
              display: flex;
              flex-direction: column;
              box-sizing: border-box;
            "
          >
            <sc-if value="{{ isSignin }}" hint-placeholder-val="{{ true }}">
              <div
                style="
                  font:
                    600 28px &quot;Space Grotesk&quot;,
                    sans-serif;
                  color: #f4f5f7;
                  letter-spacing: -0.015em;
                  line-height: 1.05;
                  text-align: center;
                "
              >
                Welcome back
              </div>
              <div
                style="
                  font:
                    400 13px &quot;Space Grotesk&quot;,
                    sans-serif;
                  color: #8f8b93;
                  margin-top: 9px;
                  text-align: center;
                "
              >
                New here?
                <span
                  onClick="{{ toggleMode }}"
                  style="
                    color: color-mix(in srgb, var(--accent, #5b6cff) 45%, #fff);
                    font-weight: 600;
                    cursor: pointer;
                  "
                  >Create an account</span
                >
              </div>
            </sc-if>
            <sc-if value="{{ isCreate }}">
              <div
                style="
                  font:
                    600 28px &quot;Space Grotesk&quot;,
                    sans-serif;
                  color: #f4f5f7;
                  letter-spacing: -0.015em;
                  line-height: 1.05;
                  text-align: center;
                "
              >
                Create your account
              </div>
              <div
                style="
                  font:
                    400 13px &quot;Space Grotesk&quot;,
                    sans-serif;
                  color: #8f8b93;
                  margin-top: 9px;
                  text-align: center;
                "
              >
                Already have one?
                <span
                  onClick="{{ toggleMode }}"
                  style="
                    color: color-mix(in srgb, var(--accent, #5b6cff) 45%, #fff);
                    font-weight: 600;
                    cursor: pointer;
                  "
                  >Sign in</span
                >
              </div>
            </sc-if>

            <button
              onClick="{{ cont }}"
              style="
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 11px;
                background: #ffffff;
                color: #1a1a1a;
                border: 0;
                border-radius: 12px;
                padding: 13px;
                font:
                  600 14px &quot;Space Grotesk&quot;,
                  sans-serif;
                margin-top: 24px;
                cursor: pointer;
                transition: all 0.18s;
                box-shadow: 0 2px 12px -5px rgba(0, 0, 0, 0.5);
              "
              style-hover="transform:translateY(-1px);box-shadow:0 6px 18px -6px rgba(0,0,0,.55)"
            >
              <sc-if value="{{ isSignin }}"
                ><span
                  style="
                    position: absolute;
                    top: -9px;
                    right: 12px;
                    background: var(--accent, #5b6cff);
                    color: #fff;
                    font:
                      600 9.5px &quot;Space Grotesk&quot;,
                      sans-serif;
                    border-radius: 6px;
                    padding: 2px 7px;
                    letter-spacing: 0.02em;
                    box-shadow: 0 4px 10px -3px
                      color-mix(
                        in srgb,
                        var(--accent, #5b6cff) 70%,
                        transparent
                      );
                  "
                  >Last used</span
                ></sc-if
              >
              <span
                style="
                  width: 20px;
                  height: 20px;
                  border-radius: 50%;
                  background: #fff;
                  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
                  display: inline-flex;
                  align-items: center;
                  justify-content: center;
                "
                ><svg viewBox="0 0 48 48" width="14" height="14">
                  <path
                    fill="#EA4335"
                    d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"
                  ></path>
                  <path
                    fill="#4285F4"
                    d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"
                  ></path>
                  <path
                    fill="#FBBC05"
                    d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"
                  ></path>
                  <path
                    fill="#34A853"
                    d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"
                  ></path></svg
              ></span>
              <sc-if value="{{ isSignin }}" hint-placeholder-val="{{ true }}"
                >Continue with Google</sc-if
              >
              <sc-if value="{{ isCreate }}">Sign up with Google</sc-if>
            </button>

            <div
              style="
                display: flex;
                align-items: center;
                gap: 12px;
                color: #6a6459;
                font:
                  400 11px &quot;Space Mono&quot;,
                  monospace;
                margin: 26px 0;
              "
            >
              <span
                style="
                  flex: 1;
                  height: 1px;
                  background: rgba(255, 255, 255, 0.09);
                "
              ></span
              >OR<span
                style="
                  flex: 1;
                  height: 1px;
                  background: rgba(255, 255, 255, 0.09);
                "
              ></span>
            </div>

            <div style="position: relative">
              <span
                style="
                  position: absolute;
                  left: 16px;
                  top: 50%;
                  transform: translateY(-50%);
                  color: #7c7688;
                  pointer-events: none;
                  display: flex;
                "
                ><svg
                  width="17"
                  height="17"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="3" y="5" width="18" height="14" rx="2.5"></rect>
                  <path d="m3 7 9 6 9-6"></path></svg
              ></span>
              <input
                type="email"
                placeholder="Enter your email"
                style="
                  width: 100%;
                  border: 1px solid #35333c;
                  background: #1b1a21;
                  border-radius: 12px;
                  padding: 12px 14px 12px 44px;
                  font-size: 14px;
                  color: #f2f3f6;
                  outline: none;
                  caret-color: var(--accent, #5b6cff);
                  transition: border-color 0.18s;
                "
                style-focus="border-color:color-mix(in srgb,var(--accent,#5b6cff) 60%,transparent)"
              />
            </div>
            <div style="position: relative; margin-top: 11px">
              <span
                style="
                  position: absolute;
                  left: 16px;
                  top: 50%;
                  transform: translateY(-50%);
                  color: #7c7688;
                  pointer-events: none;
                  display: flex;
                "
                ><svg
                  width="17"
                  height="17"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.7"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <rect x="4" y="11" width="16" height="10" rx="2.5"></rect>
                  <path d="M8 11V8a4 4 0 0 1 8 0v3"></path></svg
              ></span>
              <input
                type="password"
                placeholder="Password"
                style="
                  width: 100%;
                  border: 1px solid #35333c;
                  background: #1b1a21;
                  border-radius: 12px;
                  padding: 12px 14px 12px 44px;
                  font-size: 14px;
                  color: #f2f3f6;
                  outline: none;
                  caret-color: var(--accent, #5b6cff);
                  transition: border-color 0.18s;
                "
                style-focus="border-color:color-mix(in srgb,var(--accent,#5b6cff) 60%,transparent)"
              />
            </div>

            <button
              onClick="{{ cont }}"
              style="
                width: 100%;
                border: 1px solid
                  color-mix(in srgb, var(--accent, #5b6cff) 32%, transparent);
                border-radius: 12px;
                background: color-mix(
                  in srgb,
                  var(--accent, #5b6cff) 15%,
                  #141018
                );
                color: color-mix(in srgb, var(--accent, #5b6cff) 62%, #ffffff);
                padding: 13px;
                font:
                  600 14px &quot;Space Grotesk&quot;,
                  sans-serif;
                margin-top: 14px;
                cursor: pointer;
                transition: all 0.18s;
              "
              style-hover="background:color-mix(in srgb,var(--accent,#5b6cff) 24%,#141018);color:#fff"
            >
              <sc-if value="{{ isSignin }}" hint-placeholder-val="{{ true }}"
                >Sign in &amp; continue</sc-if
              >
              <sc-if value="{{ isCreate }}"
                >Create account &amp; continue</sc-if
              >
            </button>

            <div
              style="
                font:
                  400 11px &quot;Space Grotesk&quot;,
                  sans-serif;
                color: #6a6459;
                text-align: center;
                line-height: 1.5;
                margin-top: 18px;
              "
            >
              By continuing you agree to our
              <span
                style="
                  color: #9a938a;
                  text-decoration: underline;
                  text-underline-offset: 2px;
                "
                >Terms</span
              >
              &amp;
              <span
                style="
                  color: #9a938a;
                  text-decoration: underline;
                  text-underline-offset: 2px;
                "
                >Privacy Policy</span
              >
            </div>
          </div>

          <!-- SHOWCASE PANEL -->
          <div
            style="
              width: 332px;
              position: relative;
              background: linear-gradient(
                180deg,
                #ffd7a1 0%,
                #ff9bb0 38%,
                #c58bd8 66%,
                #6a5bc0 100%
              );
              overflow: hidden;
            "
          >
            <div
              style="
                position: absolute;
                inset: 0;
                background:
                  radial-gradient(
                    120% 80% at 28% 12%,
                    rgba(255, 196, 120, 0.85),
                    transparent 55%
                  ),
                  radial-gradient(
                    110% 80% at 82% 26%,
                    rgba(255, 122, 156, 0.8),
                    transparent 55%
                  ),
                  radial-gradient(
                    130% 90% at 60% 88%,
                    rgba(120, 96, 230, 0.7),
                    transparent 60%
                  );
              "
            ></div>
            <div
              style="
                position: absolute;
                width: 250px;
                height: 250px;
                left: 14%;
                top: 8%;
                background: radial-gradient(
                  circle,
                  rgba(255, 255, 255, 0.55),
                  transparent 62%
                );
                filter: blur(24px);
                animation: avFloat 8s ease-in-out infinite;
              "
            ></div>
            <div
              style="
                position: absolute;
                left: 0;
                right: 0;
                bottom: 0;
                height: 40%;
                background: linear-gradient(
                  180deg,
                  rgba(60, 40, 90, 0),
                  rgba(40, 28, 66, 0.55)
                );
              "
            ></div>
            <div
              style="
                position: absolute;
                left: -10%;
                right: -10%;
                bottom: 13%;
                height: 86px;
                border-radius: 50%;
                background: rgba(58, 40, 86, 0.5);
                filter: blur(11px);
              "
            ></div>
            <div
              style="
                position: absolute;
                left: -20%;
                right: 10%;
                bottom: 5%;
                height: 74px;
                border-radius: 50%;
                background: rgba(40, 26, 60, 0.6);
                filter: blur(11px);
              "
            ></div>
            <button
              onClick="{{ dismiss }}"
              style="
                position: absolute;
                top: 15px;
                right: 15px;
                width: 30px;
                height: 30px;
                border-radius: 50%;
                background: rgba(10, 8, 14, 0.42);
                border: 1px solid rgba(255, 255, 255, 0.24);
                color: #fff;
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                backdrop-filter: blur(4px);
                transition: all 0.18s;
              "
              style-hover="background:rgba(10,8,14,.7)"
            >
              <svg
                width="14"
                height="14"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2.1"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M18 6 6 18"></path>
                <path d="M6 6l12 12"></path>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </x-dc>
    <script
      type="text/x-dc"
      data-dc-script
      data-props='{
  "$preview": { "width": 1440, "height": 900 },
  "accent": { "editor": "color", "default": "#5b6cff", "options": ["#5b6cff", "#22d3ee", "#a3e635", "#ff5d8f"], "tsType": "string", "section": "Theme" },
  "mode": { "editor": "enum", "default": "signin", "options": ["signin", "create"], "tsType": "string", "section": "Auth" }
}'
    >
      class Component extends DCLogic {
        constructor(props){
          super(props);
          this.state = { mode: (props && props.mode) || 'signin' };
          this.rootRef = React.createRef();
        }
        componentDidMount(){ this.applyTheme(); }
        componentDidUpdate(){ this.applyTheme(); }
        applyTheme(){
          const r = this.rootRef.current; if (!r) return;
          const p = this.props || {};
          r.style.setProperty('--accent', p.accent || '#5b6cff');
        }
        renderVals(){
          const mode = this.state.mode || 'signin';
          return {
            rootRef: this.rootRef,
            isSignin: mode === 'signin',
            isCreate: mode === 'create',
            toggleMode: () => this.setState({ mode: this.state.mode === 'create' ? 'signin' : 'create' }),
            cont: () => { window.location.href = 'Workspace.dc.html'; },
            dismiss: () => { window.location.href = encodeURI('Empty State - Anchor.dc.html'); }
          };
        }
      }
    </script>
  </body>
</html>
