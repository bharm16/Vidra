<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="./support.js"></script>
  </head>
  <body>
    <x-dc>
      <div
        ref="{{ rootRef }}"
        style="
          height: 100%;
          flex: none;
          box-sizing: border-box;
          background: #0c0d11;
          border-right: 1px solid rgba(255, 255, 255, 0.06);
          display: flex;
          flex-direction: column;
          padding: 16px 11px;
          width: 240px;
          overflow: hidden;
          transition: width 0.26s cubic-bezier(0.3, 0.85, 0.3, 1);
          font-family: &quot;Space Grotesk&quot;, system-ui, sans-serif;
          --accent: #5b6cff;
        "
      >
        <!-- header: logo + edge collapse -->
        <div
          ref="{{ headerRef }}"
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 20px;
          "
        >
          <button
            ref="{{ logoRef }}"
            onClick="{{ goNew }}"
            title="New session"
            style="
              display: flex;
              align-items: center;
              gap: 11px;
              border: 0;
              background: transparent;
              cursor: pointer;
              padding: 6px 6px;
              border-radius: 11px;
              transition: background 0.16s;
            "
            style-hover="background:rgba(255,255,255,.04)"
          >
            <span
              style="
                width: 30px;
                height: 30px;
                flex: none;
                border-radius: 9px;
                background: linear-gradient(
                  150deg,
                  var(--accent, #5b6cff),
                  #9aa6ff
                );
                display: flex;
                align-items: center;
                justify-content: center;
                box-shadow: 0 4px 14px -4px var(--accent, #5b6cff);
              "
              ><svg width="12" height="12" viewBox="0 0 12 12" fill="#0a0b0e">
                <path
                  d="M3.2 2.4a.6.6 0 0 1 .92-.5l5 3.6a.6.6 0 0 1 0 1l-5 3.6a.6.6 0 0 1-.92-.5z"
                ></path></svg
            ></span>
            <span
              ref="{{ wordRef }}"
              style="
                font:
                  600 18px &quot;Space Grotesk&quot;,
                  sans-serif;
                letter-spacing: -0.01em;
                color: #f2f3f6;
                white-space: nowrap;
              "
              >Vidra</span
            >
          </button>
          <button
            ref="{{ toggleRef }}"
            onClick="{{ toggle }}"
            title="Collapse sidebar"
            style="
              width: 34px;
              height: 34px;
              flex: none;
              border: 0;
              border-radius: 9px;
              background: transparent;
              color: #7a8090;
              display: flex;
              align-items: center;
              justify-content: center;
              cursor: pointer;
              transition: all 0.16s;
            "
            style-hover="background:rgba(255,255,255,.06);color:#f2f3f6"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect x="3" y="4" width="18" height="16" rx="2.5"></rect>
              <path d="M9 4v16"></path>
            </svg>
          </button>
        </div>

        <!-- nav -->
        <div style="display: flex; flex-direction: column; gap: 4px">
          <button
            onClick="{{ goNew }}"
            style="
              display: flex;
              align-items: center;
              gap: 12px;
              width: 100%;
              border: 0;
              background: transparent;
              border-radius: 11px;
              cursor: pointer;
              padding: 0;
              color: #c3c7d0;
              transition: all 0.16s;
            "
            style-hover="background:rgba(255,255,255,.05);color:#f2f3f6"
          >
            <span
              style="
                width: 42px;
                height: 42px;
                flex: none;
                display: flex;
                align-items: center;
                justify-content: center;
                color: color-mix(in srgb, var(--accent, #5b6cff) 62%, #fff);
              "
              ><svg
                width="19"
                height="19"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.9"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path d="M12 5v14"></path>
                <path d="M5 12h14"></path></svg
            ></span>
            <span
              style="
                font:
                  600 13.5px &quot;Space Grotesk&quot;,
                  sans-serif;
                white-space: nowrap;
              "
              >New session</span
            >
          </button>
          <button
            ref="{{ libRef }}"
            onClick="{{ goLibrary }}"
            style="
              display: flex;
              align-items: center;
              gap: 12px;
              width: 100%;
              border: 0;
              background: transparent;
              border-radius: 11px;
              cursor: pointer;
              padding: 0;
              color: #8b909c;
              transition: all 0.16s;
            "
            style-hover="background:rgba(255,255,255,.05);color:#f2f3f6"
          >
            <span
              style="
                width: 42px;
                height: 42px;
                flex: none;
                display: flex;
                align-items: center;
                justify-content: center;
              "
              ><svg
                width="18"
                height="18"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="3" y="4" width="7" height="16" rx="1.4"></rect>
                <rect x="14" y="4" width="7" height="10" rx="1.4"></rect></svg
            ></span>
            <span
              style="
                font:
                  500 13.5px &quot;Space Grotesk&quot;,
                  sans-serif;
                white-space: nowrap;
              "
              >Library</span
            >
          </button>
        </div>

        <div style="flex: 1"></div>

        <!-- docs -->
        <button
          title="Docs &amp; help"
          style="
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            border: 0;
            background: transparent;
            border-radius: 11px;
            cursor: pointer;
            padding: 0;
            color: #8b909c;
            margin-bottom: 6px;
            transition: all 0.16s;
          "
          style-hover="background:rgba(255,255,255,.05);color:#f2f3f6"
        >
          <span
            style="
              width: 42px;
              height: 42px;
              flex: none;
              display: flex;
              align-items: center;
              justify-content: center;
            "
            ><svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="9.2"></circle>
              <path
                d="M9.4 9.2a2.6 2.6 0 0 1 5.05.85c0 1.7-2.5 2.5-2.5 2.5"
              ></path>
              <path d="M12 17h.01"></path></svg
          ></span>
          <span
            style="
              font:
                500 13.5px &quot;Space Grotesk&quot;,
                sans-serif;
              white-space: nowrap;
            "
            >Docs &amp; help</span
          >
        </button>

        <!-- account -->
        <button
          ref="{{ acctRef }}"
          onClick="{{ goAccount }}"
          title="Account"
          style="
            display: flex;
            align-items: center;
            gap: 11px;
            width: 100%;
            border: 0;
            background: transparent;
            border-radius: 12px;
            cursor: pointer;
            padding: 6px;
            transition: background 0.16s;
          "
          style-hover="background:rgba(255,255,255,.05)"
        >
          <span
            style="
              width: 34px;
              height: 34px;
              flex: none;
              border-radius: 50%;
              background: linear-gradient(150deg, #f4d3a2, #e6b487);
              border: 1px solid rgba(255, 255, 255, 0.16);
              box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.3);
            "
          ></span>
          <span
            style="
              display: flex;
              flex-direction: column;
              align-items: flex-start;
              min-width: 0;
              white-space: nowrap;
            "
            ><span
              style="
                font:
                  600 13px &quot;Space Grotesk&quot;,
                  sans-serif;
                color: #e9ebf0;
              "
              >Alex Rivera</span
            ><span
              style="
                font:
                  400 11px &quot;Space Mono&quot;,
                  monospace;
                color: #7a8090;
                margin-top: 1px;
              "
              >alex@example.com</span
            ></span
          >
        </button>
      </div>
    </x-dc>
    <script
      type="text/x-dc"
      data-dc-script
      data-props='{
  "$preview": { "width": 240, "height": 780 },
  "active": { "editor": "enum", "default": "none", "options": ["none", "library", "new", "account"], "tsType": "string" },
  "collapsed": { "editor": "boolean", "default": false, "tsType": "boolean" }
}'
    >
      class Component extends DCLogic {
        constructor(props){
          super(props);
          this.state = { collapsed: !!(props && props.collapsed) };
          this.rootRef = React.createRef();
          this.libRef = React.createRef();
          this.headerRef = React.createRef();
          this.logoRef = React.createRef();
          this.wordRef = React.createRef();
          this.toggleRef = React.createRef();
          this.acctRef = React.createRef();
        }
        componentDidMount(){ this.applyLayout(); }
        componentDidUpdate(){ this.applyLayout(); }
        applyLayout(){
          const collapsed = this.state.collapsed;
          const r = this.rootRef.current; if (r) r.style.width = collapsed ? '64px' : '240px';
          const h = this.headerRef.current;
          if (h) {
            h.style.flexDirection = collapsed ? 'column' : 'row';
            h.style.justifyContent = collapsed ? 'flex-start' : 'space-between';
            h.style.gap = collapsed ? '10px' : '8px';
          }
          const lg = this.logoRef.current;
          if (lg) { lg.style.justifyContent = 'center'; lg.style.padding = collapsed ? '6px 0' : '6px 6px'; }
          const w = this.wordRef.current; if (w) w.style.display = collapsed ? 'none' : 'inline';
          const lb = this.libRef.current;
          if (lb) {
            const on = (this.props && this.props.active) === 'library';
            lb.style.background = on ? 'rgba(255,255,255,.07)' : 'transparent';
            lb.style.color = on ? '#f2f3f6' : '#8b909c';
          }
          const ab = this.acctRef.current;
          if (ab) ab.style.background = ((this.props && this.props.active) === 'account') ? 'rgba(255,255,255,.06)' : 'transparent';
        }
        renderVals(){
          return {
            rootRef: this.rootRef,
            libRef: this.libRef,
            headerRef: this.headerRef,
            logoRef: this.logoRef,
            wordRef: this.wordRef,
            toggleRef: this.toggleRef,
            acctRef: this.acctRef,
            toggle: () => this.setState({ collapsed: !this.state.collapsed }),
            goNew: () => { window.location.href = encodeURI('Empty State - Anchor.dc.html'); },
            goLibrary: () => { window.location.href = 'Library.dc.html'; },
            goAccount: () => { window.location.href = 'Account.dc.html'; }
          };
        }
      }
    </script>
  </body>
</html>
